apiVersion: v1
kind: Namespace
metadata:
  name: mlops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlops-config
  namespace: mlops
data:
  mlflow_tracking_uri: "http://mlflow-service.mlops.svc.cluster.local:5000"
  drift_psi_threshold: "0.2"
  canary_traffic_pct: "10"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-model-champion-hpa
  namespace: mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-model-champion
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: drift-detection-job
  namespace: mlops
spec:
  schedule: "0 */6 * * *"   # Every 6 hours
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: drift-check
              image: mlops-platform/drift-detector:latest
              command: ["python", "-m", "drift.run_check"]
              env:
                - name: PSI_THRESHOLD
                  valueFrom:
                    configMapKeyRef:
                      name: mlops-config
                      key: drift_psi_threshold
          restartPolicy: OnFailure
