apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model-champion
  namespace: mlops
  labels:
    app: ml-model
    track: champion
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ml-model
      track: champion
  template:
    metadata:
      labels:
        app: ml-model
        track: champion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: model-server
          image: mlops-platform/model-server:champion
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_STAGE
              value: "Production"
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: mlops-config
                  key: mlflow_tracking_uri
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ml-model-champion-svc
  namespace: mlops
spec:
  selector:
    app: ml-model
    track: champion
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
